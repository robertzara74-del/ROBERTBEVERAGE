<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robert ✦ Beverage Concept</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #F5EFE0;
            --dark: #1A1208;
            --amber: #C8843A;
            --amber-light: #E4A255;
            --text: #2E2010;
            --muted: #7A6A50;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text); overflow-x: hidden; scroll-behavior: smooth; }

        nav { position: sticky; top: 0; z-index: 100; background: rgba(245, 239, 224, 0.92); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.07); padding: 1rem 5vw; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700; color: var(--dark); }
        .logo span { color: var(--amber); }

        .btn-amber { background: var(--amber); color: white; border: none; padding: 0.8rem 2rem; border-radius: 999px; font-size: 0.95rem; font-weight: 500; cursor: pointer; transition: 0.2s; text-decoration: none; display: inline-block; }
        .btn-amber:hover { background: var(--amber-light); transform: translateY(-2px); }

        .hero { min-height: 90vh; display: flex; flex-direction: column; justify-content: center; padding: 4rem 8vw; position: relative; }
        h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.8rem, 6vw, 5rem); line-height: 1.05; margin-bottom: 1.5rem; }
        h1 em { color: var(--amber); font-style: italic; }

        .section-title { font-family: 'Playfair Display', serif; font-size: clamp(1.8rem, 3.5vw, 3rem); margin-bottom: 2.5rem; }
        .label { color: var(--amber); letter-spacing: 0.2em; text-transform: uppercase; font-size: 0.7rem; font-weight: 700; margin-bottom: 1rem; display: block; }

        /* GRID PACHETE (Liniutele tale) */
        .grid-packages { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; padding: 2rem 0; }
        .pkg-card { background: white; padding: 2.5rem; border-radius: 1.5rem; border: 1px solid rgba(0,0,0,0.06); position: relative; }
        .pkg-num { font-family: 'Playfair Display', serif; font-size: 3rem; color: #F0E8D4; position: absolute; top: 1rem; right: 1.5rem; font-weight: 700; }
        .pkg-list { list-style: none; margin-top: 1.5rem; }
        .pkg-list li { font-size: 0.9rem; color: var(--muted); padding: 0.4rem 0; border-bottom: 1px solid rgba(0,0,0,0.05); display: flex; gap: 0.6rem; }
        .pkg-list li::before { content: "→"; color: var(--amber); }

        /* GRID CORDIALE */
        .filter-container { display: flex; gap: 0.7rem; flex-wrap: wrap; margin-bottom: 2rem; }
        .filter-btn { padding: 0.5rem 1.2rem; border-radius: 999px; border: 1.5px solid rgba(0,0,0,0.1); background: transparent; cursor: pointer; font-size: 0.8rem; }
        .filter-btn.active { background: var(--amber); color: white; border-color: var(--amber); }
        .cordial-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem; }
        .cordial-card { background: white; padding: 1.5rem; border-radius: 1rem; border: 1px solid rgba(0,0,0,0.06); }

        .contact-box { background: white; border-radius: 1.5rem; padding: 2.5rem; max-width: 450px; margin: 3rem auto; border: 1px solid rgba(0,0,0,0.06); text-align: center; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Robert <span>✦</span> Beverage</div>
        <a href="#contact" class="btn-amber" style="padding: 0.5rem 1.2rem;">Contact</a>
    </nav>

    <section class="hero">
        <span class="label">Artisan Cordials & Concept</span>
        <h1>Băuturi care<br><em>chiar se vând.</em></h1>
